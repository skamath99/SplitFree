name: SplitFree
options:
  bundleIdPrefix: com.sank
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SplitCore:
    path: SplitCore
targets:
  SplitFree:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: SplitCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sank.splitfree
        DEVELOPMENT_TEAM: 547M5QUW76
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: SplitFree
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "SplitFree reads receipt photos you choose so it can scan the total for you."
    scheme:
      testTargets:
        - SplitFreeUITests
  SplitFreeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: SplitFree
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
