name: SplitFree
options:
  bundleIdPrefix: com.sank
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  SplitCore:
    path: SplitCore
targets:
  SplitFree:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: SplitCore
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: SplitFree
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UIBackgroundModes: [remote-notification]
        CKSharingSupported: true
        ITSAppUsesNonExemptEncryption: false
        NSPhotoLibraryUsageDescription: "SplitFree reads receipt photos you choose so it can scan the items and total for you."
        UISupportedInterfaceOrientations~iphone: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad: [UIInterfaceOrientationPortrait, UIInterfaceOrientationPortraitUpsideDown, UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sank.splitfree
        DEVELOPMENT_TEAM: 547M5QUW76
        CODE_SIGN_ENTITLEMENTS: App/SplitFree.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.10"
        CURRENT_PROJECT_VERSION: 8
        MARKETING_VERSION: "1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - SplitFreeUITests
  SplitFreeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: SplitFree
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"
